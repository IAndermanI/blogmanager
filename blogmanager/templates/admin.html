<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Blog Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; font-weight:300; background:#f5f5f0; color:#1a1a1a; min-height:100vh; }
    .header { background:#1a1a1a; color:#fff; padding:1.5rem 2rem; display:flex; justify-content:space-between; align-items:center; }
    .header h1 { font-size:1rem; font-weight:400; letter-spacing:0.1em; text-transform:uppercase; }
    .header nav a { color:#999; text-decoration:none; margin-left:1.5rem; font-size:0.8rem; letter-spacing:0.05em; text-transform:uppercase; transition:color 0.2s; }
    .header nav a:hover, .header nav a.active { color:#fff; }
    .container { max-width:900px; margin:0 auto; padding:2rem; }
    .panel { display:none; }
    .panel.active { display:block; }
    .card { background:#fff; border:1px solid #e0e0d8; padding:2rem; margin-bottom:1.5rem; }
    .card h2 { font-size:0.85rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:1.5rem; color:#666; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem; }
    .form-row.full { grid-template-columns:1fr; }
    .field { display:flex; flex-direction:column; gap:0.4rem; }
    .field label { font-size:0.7rem; letter-spacing:0.08em; text-transform:uppercase; color:#999; }
    .field input, .field textarea, .field select { background:#fafaf8; border:1px solid #e0e0d8; color:#1a1a1a; font-family:'Inter',sans-serif; font-size:0.85rem; padding:0.6rem 0.75rem; outline:none; transition:border-color 0.2s; }
    .field input:focus, .field textarea:focus { border-color:#999; }
    .field textarea { resize:vertical; min-height:100px; line-height:1.6; }
    .color-row { display:flex; align-items:center; gap:0.5rem; }
    .color-row input[type=color] { width:36px; height:36px; padding:2px; cursor:pointer; border:1px solid #e0e0d8; background:#fafaf8; }
    .color-row input[type=text] { flex:1; }
    .btn { padding:0.6rem 1.5rem; font-family:'Inter',sans-serif; font-size:0.78rem; cursor:pointer; border:1px solid; transition:all 0.15s; letter-spacing:0.05em; text-transform:uppercase; }
    .btn-dark { background:#1a1a1a; color:#fff; border-color:#1a1a1a; }
    .btn-dark:hover { background:#333; }
    .btn-outline { background:transparent; color:#1a1a1a; border-color:#ccc; }
    .btn-outline:hover { border-color:#1a1a1a; }
    .btn-red { background:transparent; color:#cc3333; border-color:#cc3333; }
    .btn-red:hover { background:#fff0f0; }
    .btn:disabled { opacity:0.4; cursor:not-allowed; }
    /* AI box */
    .ai-box { background:#fafaf8; border:1px solid #e0e0d8; border-left:3px solid #1a1a1a; padding:1.25rem; margin-bottom:1.5rem; }
    .ai-box-label { font-size:0.65rem; letter-spacing:0.12em; text-transform:uppercase; color:#999; margin-bottom:0.75rem; }
    .ai-box textarea { width:100%; background:transparent; border:none; outline:none; color:#1a1a1a; font-family:'Inter',sans-serif; font-size:0.85rem; resize:none; min-height:60px; line-height:1.6; }
    .ai-box textarea::placeholder { color:#bbb; }
    .ai-box-footer { display:flex; justify-content:flex-end; margin-top:0.75rem; padding-top:0.75rem; border-top:1px solid #e0e0d8; }
    /* status */
    .status { padding:0.75rem 1rem; font-size:0.78rem; margin-bottom:1rem; border-left:3px solid; }
    .status.success { border-color:#2a7a2a; background:#f0fff0; color:#2a7a2a; }
    .status.error { border-color:#cc3333; background:#fff0f0; color:#cc3333; }
    .status.loading { border-color:#999; background:#fafaf8; color:#666; }
    /* blogs list */
    .blog-item { display:flex; justify-content:space-between; align-items:center; padding:1rem 0; border-bottom:1px solid #e0e0d8; }
    .blog-item:last-child { border-bottom:none; }
    .blog-item-info h3 { font-size:0.95rem; font-weight:400; margin-bottom:0.2rem; }
    .blog-item-info p { font-size:0.75rem; color:#999; }
    .blog-item-actions { display:flex; gap:0.5rem; align-items:center; }
    .color-dot { width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:2px; }
    /* blog selector */
    .blog-select { width:100%; background:#fafaf8; border:1px solid #e0e0d8; color:#1a1a1a; font-family:'Inter',sans-serif; font-size:0.85rem; padding:0.6rem 0.75rem; outline:none; margin-bottom:1.5rem; }
    .spinner { display:inline-block; width:10px; height:10px; border:2px solid currentColor; border-top-color:transparent; border-radius:50%; animation:spin 0.6s linear infinite; margin-right:0.4rem; vertical-align:middle; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
<div class="header">
  <h1>Blog Manager</h1>
  <nav>
    <a href="#" class="active" onclick="showPanel('blogs',this)">Blogs</a>
    <a href="#" onclick="showPanel('new-blog',this)">New Blog</a>
    <a href="#" onclick="showPanel('new-post',this)">New Post</a>
  </nav>
</div>

<div class="container">

  <!-- BLOGS LIST -->
  <div class="panel active" id="panel-blogs">
    <div id="status-blogs"></div>
    <div class="card">
      <h2>All Blogs</h2>
      <div id="blogs-list"><p style="color:#999;font-size:0.85rem">Loading...</p></div>
    </div>
  </div>

  <!-- NEW BLOG -->
  <div class="panel" id="panel-new-blog">
    <div id="status-new-blog"></div>
    <div class="card">
      <h2>New Blog</h2>
      <div class="ai-box">
        <div class="ai-box-label">✦ AI Fill — describe your blog idea</div>
        <textarea id="blog-ai-prompt" placeholder="e.g. Russian astrology blog for young women, mystical dark purple theme..."></textarea>
        <div class="ai-box-footer">
          <button class="btn btn-outline" id="btn-ai-blog" onclick="aiFillBlog()">Generate fields</button>
        </div>
      </div>
      <div class="form-row">
        <div class="field"><label>Blog ID (slug)</label><input type="text" id="blog-id" placeholder="my-blog"></div>
        <div class="field"><label>Name</label><input type="text" id="blog-name" placeholder="My Blog"></div>
      </div>
      <div class="form-row full">
        <div class="field"><label>Tagline</label><input type="text" id="blog-tagline" placeholder="Short catchy phrase"></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Niche</label><input type="text" id="blog-niche" placeholder="kbeauty, fitness..."></div>
        <div class="field"><label>Language</label>
          <select id="blog-language"><option value="en">English</option><option value="ru">Russian</option></select>
        </div>
      </div>
      <div class="form-row full">
        <div class="field"><label>Description</label><textarea id="blog-description" placeholder="About section text..."></textarea></div>
      </div>
      <div class="form-row full">
        <div class="field"><label>Telegram Channel (optional)</label><input type="text" id="blog-telegram" placeholder="@channel"></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Primary Color</label><div class="color-row"><input type="color" id="blog-primary-p" value="#c4847a" oninput="syncColor('primary')"><input type="text" id="blog-primary" value="#c4847a" oninput="syncPicker('primary')"></div></div>
        <div class="field"><label>Accent Color</label><div class="color-row"><input type="color" id="blog-accent-p" value="#e8c4b8" oninput="syncColor('accent')"><input type="text" id="blog-accent" value="#e8c4b8" oninput="syncPicker('accent')"></div></div>
        <div class="field"><label>Background</label><div class="color-row"><input type="color" id="blog-bg-p" value="#faf7f4" oninput="syncColor('bg')"><input type="text" id="blog-bg" value="#faf7f4" oninput="syncPicker('bg')"></div></div>
        <div class="field"><label>Text Color</label><div class="color-row"><input type="color" id="blog-text-p" value="#3d2b2b" oninput="syncColor('text')"><input type="text" id="blog-text" value="#3d2b2b" oninput="syncPicker('text')"></div></div>
      </div>
      <button class="btn btn-dark" onclick="createBlog()">Create Blog</button>
    </div>
  </div>

  <!-- NEW POST -->
  <div class="panel" id="panel-new-post">
    <div id="status-new-post"></div>
    <div class="card">
      <h2>New Post</h2>
      <div class="field" style="margin-bottom:1.5rem">
        <label>Select Blog</label>
        <select class="blog-select" id="post-blog-select">
          <option value="">— choose a blog —</option>
        </select>
      </div>
      <div class="ai-box">
        <div class="ai-box-label">✦ AI Fill — describe the post</div>
        <textarea id="post-ai-prompt" placeholder="e.g. 5 Korean skincare ingredients for dry skin, practical tips..."></textarea>
        <div class="ai-box-footer">
          <button class="btn btn-outline" id="btn-ai-post" onclick="aiFillPost()">Generate post</button>
        </div>
      </div>
      <div class="form-row">
        <div class="field"><label>Title</label><input type="text" id="post-title" placeholder="Post title"></div>
        <div class="field"><label>Category</label><input type="text" id="post-category" placeholder="Tips, Review..."></div>
      </div>
      <div class="form-row full">
        <div class="field"><label>Excerpt (optional)</label><input type="text" id="post-excerpt" placeholder="Short summary"></div>
      </div>
      <div class="form-row full">
        <div class="field"><label>Content</label><textarea id="post-content" style="min-height:180px" placeholder="Post content..."></textarea></div>
      </div>
      <button class="btn btn-dark" onclick="createPost()">Publish Post</button>
    </div>
  </div>

</div>

<script>
function showPanel(name, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.header nav a').forEach(a => a.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  if (el) el.classList.add('active');
  if (name === 'blogs') loadBlogs();
  if (name === 'new-post') loadBlogSelect();
}

function setStatus(id, type, msg) {
  const el = document.getElementById('status-' + id);
  if (!msg) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="status ${type}">${type==='loading'?'<span class="spinner"></span>':''}${msg}</div>`;
}

function syncColor(f) { document.getElementById('blog-'+f).value = document.getElementById('blog-'+f+'-p').value; }
function syncPicker(f) { const v=document.getElementById('blog-'+f).value; if(/^#[0-9a-fA-F]{6}$/.test(v)) document.getElementById('blog-'+f+'-p').value=v; }

async function loadBlogs() {
  try {
    const res = await fetch('/api/blogs');
    const blogs = await res.json();
    const el = document.getElementById('blogs-list');
    if (!blogs.length) { el.innerHTML = '<p style="color:#999;font-size:0.85rem">No blogs yet.</p>'; return; }
    el.innerHTML = blogs.map(b => `
      <div class="blog-item">
        <div class="blog-item-info">
          <h3>${b.name}
            <span class="color-dot" style="background:${b.primary_color}" title="primary"></span>
            <span class="color-dot" style="background:${b.accent_color}" title="accent"></span>
            <span class="color-dot" style="background:${b.bg_color};border:1px solid #ccc" title="bg"></span>
          </h3>
          <p>/${b.id}/ · ${b.niche} · ${b.language} · ${b.post_count||0} posts</p>
        </div>
        <div class="blog-item-actions">
          <a href="/${b.id}/" target="_blank" class="btn btn-outline" style="font-size:0.7rem;padding:0.4rem 0.9rem;text-decoration:none">View</a>
          <button class="btn btn-red" style="font-size:0.7rem;padding:0.4rem 0.9rem" onclick="deleteBlog('${b.id}')">Delete</button>
        </div>
      </div>`).join('');
  } catch(e) { setStatus('blogs', 'error', 'Failed to load blogs'); }
}

async function deleteBlog(id) {
  if (!confirm(`Delete blog "${id}"? This deletes all its posts too.`)) return;
  await fetch(`/api/blogs/${id}`, {method:'DELETE'});
  loadBlogs();
}

async function loadBlogSelect() {
  const res = await fetch('/api/blogs');
  const blogs = await res.json();
  const sel = document.getElementById('post-blog-select');
  sel.innerHTML = '<option value="">— choose a blog —</option>' +
    blogs.map(b => `<option value="${b.id}">${b.name} (${b.language})</option>`).join('');
}

async function aiFillBlog() {
  const prompt = document.getElementById('blog-ai-prompt').value.trim();
  if (!prompt) return;
  const btn = document.getElementById('btn-ai-blog');
  btn.disabled = true; btn.textContent = 'Generating...';
  setStatus('new-blog', 'loading', 'AI is filling fields...');
  try {
    const res = await fetch('/api/ai/generate-blog', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({prompt})
    });
    if (!res.ok) throw new Error(await res.text());
    const d = await res.json();
    document.getElementById('blog-id').value          = d.id || '';
    document.getElementById('blog-name').value         = d.name || '';
    document.getElementById('blog-tagline').value      = d.tagline || '';
    document.getElementById('blog-description').value  = d.description || '';
    document.getElementById('blog-niche').value        = d.niche || '';
    document.getElementById('blog-language').value     = d.language || 'en';
    if (d.primary_color) { document.getElementById('blog-primary').value=d.primary_color; document.getElementById('blog-primary-p').value=d.primary_color; }
    if (d.accent_color)  { document.getElementById('blog-accent').value=d.accent_color;   document.getElementById('blog-accent-p').value=d.accent_color; }
    if (d.bg_color)      { document.getElementById('blog-bg').value=d.bg_color;           document.getElementById('blog-bg-p').value=d.bg_color; }
    if (d.text_color)    { document.getElementById('blog-text').value=d.text_color;       document.getElementById('blog-text-p').value=d.text_color; }
    setStatus('new-blog', 'success', 'Fields filled! Review and click "Create Blog".');
  } catch(e) { setStatus('new-blog', 'error', 'AI error: ' + e.message); }
  finally { btn.disabled=false; btn.textContent='Generate fields'; }
}

async function createBlog() {
  const body = {
    id: document.getElementById('blog-id').value.trim(),
    name: document.getElementById('blog-name').value.trim(),
    tagline: document.getElementById('blog-tagline').value.trim(),
    description: document.getElementById('blog-description').value.trim(),
    niche: document.getElementById('blog-niche').value.trim(),
    language: document.getElementById('blog-language').value,
    primary_color: document.getElementById('blog-primary').value,
    accent_color: document.getElementById('blog-accent').value,
    bg_color: document.getElementById('blog-bg').value,
    text_color: document.getElementById('blog-text').value,
    telegram_channel: document.getElementById('blog-telegram').value.trim() || null,
  };
  if (!body.id || !body.name) { setStatus('new-blog','error','Blog ID and Name are required'); return; }
  setStatus('new-blog','loading','Creating...');
  try {
    const res = await fetch('/api/blogs', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d = await res.json();
    if (!res.ok) throw new Error(d.detail||JSON.stringify(d));
    setStatus('new-blog','success',`Created! <a href="/${body.id}/" target="_blank">View →</a>`);
  } catch(e) { setStatus('new-blog','error','Error: '+e.message); }
}

async function aiFillPost() {
  const prompt = document.getElementById('post-ai-prompt').value.trim();
  const blog_id = document.getElementById('post-blog-select').value;
  if (!prompt) return;
  if (!blog_id) { setStatus('new-post','error','Select a blog first'); return; }
  const btn = document.getElementById('btn-ai-post');
  btn.disabled=true; btn.textContent='Generating...';
  setStatus('new-post','loading','AI is writing your post...');
  try {
    const res = await fetch('/api/ai/generate-post', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({prompt, blog_id})
    });
    if (!res.ok) throw new Error(await res.text());
    const d = await res.json();
    document.getElementById('post-title').value    = d.title    || '';
    document.getElementById('post-content').value  = d.content  || '';
    document.getElementById('post-category').value = d.category || '';
    document.getElementById('post-excerpt').value  = d.excerpt  || '';
    setStatus('new-post','success','Post generated! Review and click "Publish Post".');
  } catch(e) { setStatus('new-post','error','AI error: '+e.message); }
  finally { btn.disabled=false; btn.textContent='Generate post'; }
}

async function createPost() {
  const blog_id = document.getElementById('post-blog-select').value;
  if (!blog_id) { setStatus('new-post','error','Select a blog first'); return; }
  const body = {
    title: document.getElementById('post-title').value.trim(),
    content: document.getElementById('post-content').value.trim(),
    category: document.getElementById('post-category').value.trim() || null,
    excerpt: document.getElementById('post-excerpt').value.trim() || null,
  };
  if (!body.title || !body.content) { setStatus('new-post','error','Title and content are required'); return; }
  setStatus('new-post','loading','Publishing...');
  try {
    const res = await fetch(`/api/blogs/${blog_id}/posts`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d = await res.json();
    if (!res.ok) throw new Error(d.detail||JSON.stringify(d));
    setStatus('new-post','success',`Published! <a href="/${blog_id}/blog/${d.slug}" target="_blank">View →</a>`);
    ['post-title','post-content','post-category','post-excerpt'].forEach(id => document.getElementById(id).value='');
  } catch(e) { setStatus('new-post','error','Error: '+e.message); }
}

loadBlogs();
</script>
</body>
</html>
